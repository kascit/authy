<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Authenticating - auth.dhanur.me</title>

    <script src="popup-nav-config.js"></script>
    <script src="https://dhanur.me/js/shell.js" defer></script>
  </head>
  <body>
    <!-- The shell.js will automatically wrap this main element within a .drawer context -->
    <main
      id="app"
      class="w-full max-w-7xl mx-auto p-4 lg:p-8 flex items-center justify-center min-h-[60vh]"
    >
      <div class="flex flex-col items-center gap-4" id="stateLoading">
        <span class="loading loading-spinner loading-md"></span>
        <p class="text-sm font-semibold text-base-content/85 text-center">
          Completing sign-in process...
        </p>
      </div>
      <div
        class="flex flex-col items-center gap-4 hidden w-full"
        id="stateError"
      >
        <div
          class="alert alert-error md:max-w-sm w-full flex-col items-center text-center gap-2"
        >
          <i class="fa-solid fa-circle-xmark text-xl"></i>
          <div>
            <h3 class="font-bold">Authentication failed</h3>
            <p class="text-sm">There was an issue processing your login.</p>
          </div>
          <p class="text-xs opacity-70">
            Closing in <span id="closeCountdown">3</span>s
          </p>
          <button class="btn btn-sm btn-primary" id="btnClose">
            Close Window
          </button>
        </div>
      </div>
    </main>

    <script src="popup-handler.js"></script>
  </body>
</html>

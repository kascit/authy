<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auth Popup Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@latest/dist/full.css"
      rel="stylesheet"
    />

  </head>
  <body class="min-h-screen bg-base-200">
    <div class="container mx-auto p-8 max-w-2xl">
      <div class="card bg-base-100 shadow-xl">
        <div class="card-body">
          <h1 class="card-title text-3xl mb-4">🧪 Popup Flow Test</h1>

          <!-- Auth Status Display -->
          <div class="alert" id="statusAlert">
            <span class="loading loading-spinner loading-sm"></span>
            <span>Loading auth status...</span>
          </div>

          <!-- Auth Info -->
          <div id="authInfo" class="hidden">
            <div class="stats shadow w-full">
              <div class="stat">
                <div class="stat-title">Status</div>
                <div class="stat-value text-lg" id="authStatus">Guest</div>
              </div>
              <div class="stat">
                <div class="stat-title">Role</div>
                <div class="stat-value text-lg" id="authRole">guest</div>
              </div>
            </div>

            <div
              id="userCard"
              class="hidden mt-4 flex items-center gap-4 p-4 bg-base-200 rounded-lg"
            >
              <div class="avatar">
                <div
                  class="w-16 rounded-full ring ring-primary ring-offset-base-100 ring-offset-2"
                >
                  <img id="userAvatar" src="" alt="Avatar" />
                </div>
              </div>
              <div>
                <div class="font-bold" id="userName"></div>
                <div class="text-sm opacity-70" id="userEmail"></div>
              </div>
            </div>
          </div>

          <!-- Action Buttons -->
          <div class="card-actions justify-end mt-6">
            <button class="btn btn-primary" id="btnLogin">
              🔓 Test Login Popup
            </button>
            <button
              class="btn btn-secondary hidden"
              id="btnUpgrade"
            >
              🔐 Test Admin Upgrade
            </button>
            <button
              class="btn btn-error hidden"
              id="btnLogout"
            >
              🚪 Logout
            </button>
            <button class="btn btn-ghost" id="btnRefresh">
              🔄 Refresh Status
            </button>
          </div>

          <!-- Event Log -->
          <div class="divider">Event Log</div>
          <div class="mockup-code text-xs max-h-64 overflow-auto">
            <pre id="eventLog"><code>Waiting for events...</code></pre>
          </div>
        </div>
      </div>
    </div>

    <!-- Configure and Load External Script -->
    <script src="temp-test-popup.js"></script>

    <!-- Load Auth SDK -->
    <script src="/auth-client.js"></script>
  </body>
</html>

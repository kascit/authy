name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: Install and Verify
    runs-on: ubuntu-latest
    if: vars.SKIP_ACTIONS != 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Syntax checks
        run: |
          node --check src/server.js
          node --check src/routes/api.js
          node --check src/db.js
          node --check src/lib/service-token.js

  deploy-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build
    if: vars.SKIP_ACTIONS != 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, 'dependabot')

    steps:
      - name: Trigger Render Deploy Hook
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

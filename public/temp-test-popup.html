<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auth Popup Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@latest/dist/full.css"
      rel="stylesheet"
    />
  </head>
  <body class="min-h-screen bg-base-200">
    <div class="container mx-auto p-8 max-w-2xl">
      <div class="card bg-base-100 shadow-xl">
        <div class="card-body">
          <h1 class="card-title text-3xl mb-4">🧪 Popup Flow Test</h1>

          <!-- Auth Status Display -->
          <div class="alert" id="statusAlert">
            <span class="loading loading-spinner loading-sm"></span>
            <span>Loading auth status...</span>
          </div>

          <!-- Auth Info -->
          <div id="authInfo" class="hidden">
            <div class="stats shadow w-full">
              <div class="stat">
                <div class="stat-title">Status</div>
                <div class="stat-value text-lg" id="authStatus">Guest</div>
              </div>
              <div class="stat">
                <div class="stat-title">Role</div>
                <div class="stat-value text-lg" id="authRole">guest</div>
              </div>
            </div>

            <div
              id="userCard"
              class="hidden mt-4 flex items-center gap-4 p-4 bg-base-200 rounded-lg"
            >
              <div class="avatar">
                <div
                  class="w-16 rounded-full ring ring-primary ring-offset-base-100 ring-offset-2"
                >
                  <img id="userAvatar" src="" alt="Avatar" />
                </div>
              </div>
              <div>
                <div class="font-bold" id="userName"></div>
                <div class="text-sm opacity-70" id="userEmail"></div>
              </div>
            </div>
          </div>

          <!-- Action Buttons -->
          <div class="card-actions justify-end mt-6">
            <button class="btn btn-primary" id="btnLogin" onclick="testLogin()">
              🔓 Test Login Popup
            </button>
            <button
              class="btn btn-secondary hidden"
              id="btnUpgrade"
              onclick="testUpgrade()"
            >
              🔐 Test Admin Upgrade
            </button>
            <button
              class="btn btn-error hidden"
              id="btnLogout"
              onclick="testLogout()"
            >
              🚪 Logout
            </button>
            <button class="btn btn-ghost" onclick="testRefresh()">
              🔄 Refresh Status
            </button>
          </div>

          <!-- Event Log -->
          <div class="divider">Event Log</div>
          <div class="mockup-code text-xs max-h-64 overflow-auto">
            <pre id="eventLog"><code>Waiting for events...</code></pre>
          </div>
        </div>
      </div>
    </div>

    <!-- Configure for local testing -->
    <script>
      // Switch to localhost if testing locally
      window.AUTHY_CONFIG = {
        origin:
          window.location.hostname === "localhost"
            ? "http://localhost:3000"
            : "https://auth.dhanur.me",
      };
    </script>

    <!-- Load Auth SDK -->
    <script src="/auth-client.js"></script>

    <script>
      const log = [];

      function addLog(message, type = "info") {
        const timestamp = new Date().toLocaleTimeString();
        const icon =
          {
            info: "ℹ️",
            success: "✅",
            error: "❌",
            event: "📡",
          }[type] || "ℹ️";

        log.push(`[${timestamp}] ${icon} ${message}`);
        document.getElementById("eventLog").textContent = log
          .slice(-20)
          .join("\n");
      }

      // Initialize
      addLog("Initializing auth SDK...");

      AUTH.onReady(function (auth) {
        addLog("✅ Auth SDK ready", "success");
        updateUI(auth.status);
      });

      // Listen for auth changes
      document.addEventListener("authReady", function (event) {
        addLog("📡 authReady event fired", "event");
        addLog(`Auth state: ${JSON.stringify(event.detail)}`, "info");
      });

      document.addEventListener("authChanged", function (event) {
        addLog("📡 authChanged event fired", "event");
        addLog(`New auth state: ${JSON.stringify(event.detail)}`, "info");
        updateUI(event.detail);
      });

      // Listen for postMessage events (to debug popup communication)
      window.addEventListener("message", function (event) {
        addLog(
          `📬 Message received from ${event.origin}: ${JSON.stringify(event.data)}`,
          "event",
        );
      });

      function updateUI(status) {
        const { authenticated, role, user } = status;

        // Update status display
        const statusAlert = document.getElementById("statusAlert");
        const authInfo = document.getElementById("authInfo");

        statusAlert.className = authenticated
          ? "alert alert-success"
          : "alert alert-warning";
        statusAlert.innerHTML = authenticated
          ? "<span>🎉 Authenticated!</span>"
          : "<span>👋 Not logged in (guest)</span>";

        authInfo.classList.remove("hidden");
        document.getElementById("authStatus").textContent = authenticated
          ? "Authenticated"
          : "Guest";
        document.getElementById("authRole").textContent = role;

        // Show user card if authenticated
        const userCard = document.getElementById("userCard");
        if (authenticated && user) {
          userCard.classList.remove("hidden");
          document.getElementById("userAvatar").src = user.avatar_url;
          document.getElementById("userName").textContent = user.name;
          document.getElementById("userEmail").textContent = user.email;
        } else {
          userCard.classList.add("hidden");
        }

        // Update buttons
        document
          .getElementById("btnLogin")
          .classList.toggle("hidden", authenticated);
        document
          .getElementById("btnLogout")
          .classList.toggle("hidden", !authenticated);
        document
          .getElementById("btnUpgrade")
          .classList.toggle("hidden", !authenticated || role === "admin");
      }

      function testLogin() {
        addLog("🔓 Opening login popup...", "info");
        AUTH.login();
      }

      function testUpgrade() {
        addLog("🔐 Opening admin upgrade popup...", "info");
        AUTH.upgrade();
      }

      async function testLogout() {
        addLog("🚪 Logging out...", "info");
        await AUTH.logout();
        addLog("✅ Logged out successfully", "success");
      }

      async function testRefresh() {
        addLog("🔄 Refreshing auth status...", "info");
        await AUTH.refresh();
        addLog("✅ Status refreshed", "success");
      }
    </script>
  </body>
</html>

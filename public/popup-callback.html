<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Authenticating - auth.dhanur.me</title>

    <script src="popup-nav-config.js"></script>
    <script src="https://dhanur.me/js/shell.js" defer></script>
  </head>
  <body>
    <!-- The shell.js will automatically wrap this main element within a .drawer context -->
    <main id="app" class="w-full max-w-7xl mx-auto p-4 lg:p-8 flex items-center justify-center min-h-[60vh]">
      <div class="flex flex-col items-center gap-4" id="stateLoading">
        <span class="loading loading-spinner loading-md"></span>
        <p class="text-sm font-semibold text-base-content/85 text-center">
          Completing sign-in process...
        </p>
      </div>
      <div class="flex flex-col items-center gap-4 hidden w-full" id="stateError">
        <div class="project-card p-6 md:p-8 border-l-4 border-error md:max-w-sm w-full text-center">
          <i class="fa-solid fa-circle-xmark text-error text-4xl mb-4"></i>
          <h2 class="font-bold text-xl mb-2 text-base-content">Authentication failed</h2>
          <p class="text-sm text-base-content/60 mb-6">There was an issue processing your login.</p>
          <button class="btn bg-base-content text-base-100 hover:bg-base-content/90 border-none w-full font-bold" id="btnClose">
            Close Window
          </button>
        </div>
      </div>
    </main>

    <script src="popup-handler.js"></script>
  </body>
</html>
